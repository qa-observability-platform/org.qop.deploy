networks:
  qop_network:
    driver: bridge

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required - set it in .env.docker}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required - set it in .env.docker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set it in .env.docker}
    volumes:
      - qop_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - qop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Node.js API (port 4000) ─────────────────────────────────────────────────
  nodeapi:
    image: ravikumarsurya/qop-nodeapi:latest
    environment:
      # Database - points to postgres container on internal network
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      QOP_DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      QOP_NODEAPI_PORT: 4000
      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - set it in .env.docker (min 32 chars)}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      # CORS - frontend origin accessible from browser
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      # APP_URL is used to build invitation accept links sent via email
      APP_URL: ${APP_URL:-http://localhost:3000}
      # WS_ENDPOINT and API_BASE_URL are returned to SDK reporters.
      # Must be the HOST address so external test runners can reach them.
      WS_ENDPOINT: ${QOP_API_URL:-http://localhost:4000}/ws/ingest
      API_BASE_URL: ${QOP_API_URL:-http://localhost:4000}
      # Python AI API - internal container name
      PYTHON_API_URL: http://pythonapi:8000
    volumes:
      - qop_screenshots:/app/uploads/screenshots
    ports:
      - "4000:4000"
    networks:
      - qop_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Python AI API (port 8000) ───────────────────────────────────────────────
  pythonapi:
    image: ravikumarsurya/qop-pythonapi:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # AI provider keys (set in .env.docker - all optional, at least one needed for AI features)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PREFERRED_AI_PROVIDER: ${PREFERRED_AI_PROVIDER:-groq}
    ports:
      - "8000:8000"
    networks:
      - qop_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend (port 3000) ────────────────────────────────────────────
  web:
    image: ravikumarsurya/qop-web:latest
    environment:
      # Runtime config — no image rebuild needed when changing server URLs.
      # Set QOP_API_URL and QOP_WS_URL in your .env.docker file.
      QOP_API_URL: ${QOP_API_URL:-http://localhost:4000}
      QOP_WS_URL: ${QOP_WS_URL:-ws://localhost:4000}
    ports:
      - "3000:3000"
    networks:
      - qop_network
    depends_on:
      - nodeapi
    restart: unless-stopped

volumes:
  qop_postgres_data:
  qop_screenshots:
